name: CD (Mobile)

permissions:
  contents: write
  issues: write
  pull-requests: write

on:
  push:
    branches: ["main"]
    paths:
      - "mobile/**"
      - ".github/workflows/cd-mobile.yml"
      - "!**/*.md"
  pull_request:
    paths:
      - "mobile/**"
      - ".github/workflows/cd-mobile.yml"
      - "!**/*.md"

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref && github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  release:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./mobile

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.44.3

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Publish release
        if: github.event_name == 'push'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: npx --package semantic-release@24 --package @semantic-release/exec@7 --package @semantic-release/github@11 --package @semantic-release/git@10 semantic-release
