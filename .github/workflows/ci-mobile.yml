name: CI (Mobile)

permissions:
  contents: read

on:
  push:
    branches: ["main"]
    paths:
      - "mobile/**"
      - ".github/workflows/*-mobile.yml"
      - "!**/*.md"
  pull_request:
    paths:
      - "mobile/**"
      - ".github/workflows/*-mobile.yml"
      - "!**/*.md"

concurrency:
  # Make sure every job on main has unique group id (run_id), so cancel-in-progress only affects PR's
  # https://stackoverflow.com/questions/74117321/if-condition-in-concurrency-in-gha
  group: ${{ github.workflow }}-${{ github.head_ref && github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./mobile

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.44.3

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        id: build-apk
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //' | tr '+' '-')
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          flutter build apk --release

      - name: Rename APK
        run: |
          VERSION=${{ steps.build-apk.outputs.version }}
          cd build/app/outputs/flutter-apk
          for f in app-release.apk app-*-release.apk; do
            [ -f "$f" ] || continue
            suffix=$(echo "$f" | sed -E 's/app(-.*)?-release\.apk/\1/; s/^-//')
            if [ -n "$suffix" ]; then
              new_name="okresownik-v${VERSION}-${suffix}.apk"
            else
              new_name="okresownik-v${VERSION}.apk"
            fi
            mv "$f" "$new_name"
            echo "Renamed: $f → $new_name"
          done

      - name: Build app bundle
        run: flutter build appbundle --release

      - name: Rename AAB
        run: |
          VERSION=${{ steps.build-apk.outputs.version }}
          cd build/app/outputs/bundle/release
          mv app-release.aab "okresownik-v${VERSION}.aab"

      - name: Create GitHub Release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v3
        with:
          prerelease: true
          working_directory: ./mobile/build/app/outputs
          files: |
            ./**/*.apk
            ./**/*.aab
          body: Release ${{ github.ref_name }} created by GitHub Actions.
