services:
  postgres:
    image: postgres:16-alpine
    container_name: okresownik-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: okresownik
      POSTGRES_USER: okresownik
      POSTGRES_PASSWORD: okresownik
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U okresownik"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: okresownik-api
    restart: unless-stopped
    ports:
      - "6080:6080"
    environment:
      PORT: "6080"
      DATABASE_URL: "postgres://okresownik:okresownik@postgres:5432/okresownik?sslmode=disable"
      JWT_SECRET: "${JWT_SECRET:-change-me-in-production}"
      ALLOWED_ORIGINS: "*"
    depends_on:
      postgres:
        condition: service_healthy

  seed:
    build:
      context: ./backend
      dockerfile: Dockerfile.seed
    container_name: okresownik-seed
    restart: "no"
    environment:
      DATABASE_URL: "postgres://okresownik:okresownik@postgres:5432/okresownik?sslmode=disable"
      JWT_SECRET: "${JWT_SECRET:-change-me-in-production}"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
